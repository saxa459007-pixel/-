<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RPG Stats & Books</title>
<script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
<style>
:root {
--bg-color: #34383d;
--card-bg: #3f444b;
--nav-bg: #2b2e33;
--text-main: #ffffff;
--text-secondary: #b0b3b8;
--accent: #5865F2;
--input-bg: #4a5059;
--separator-color: #4a5057;
--gold: #ffd700;
}
body {
font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
background-color: var(--bg-color);
color: var(--text-main);
margin: 0;
padding: 0;
display: flex;
flex-direction: column;
align-items: center;
user-select: none;
min-height: 100vh;
-webkit-tap-highlight-color: transparent;
}
.top-nav {
width: 100%;
max-width: 500px;
height: 54px;
background-color: var(--nav-bg);
display: flex;
justify-content: space-around;
align-items: center;
position: sticky;
top: 0;
z-index: 100;
border-bottom: 1px solid rgba(0,0,0,0.2);
box-sizing: border-box;
}
.nav-item {
flex: 1;
height: 40px;
display: flex;
align-items: center;
justify-content: center;
cursor: pointer;
border-radius: 8px;
transition: background 0.2s, color 0.2s;
color: #72767d;
}
.nav-item:hover { background-color: rgba(255,255,255,0.05); color: var(--text-main); }
.nav-item.active { color: var(--text-main); background-color: rgba(255,255,255,0.1); }
.nav-icon {
width: 26px;
height: 26px;
fill: currentColor;
pointer-events: none;
}
.nav-item span {
font-size: 24px;
line-height: 1;
display: flex;
align-items: center;
justify-content: center;
pointer-events: none;
}
.content-container {
width: 100%;
max-width: 500px;
display: flex;
flex-direction: column;
align-items: center;
padding-bottom: 20px;
box-sizing: border-box;
flex: 1;
}
.page { display: none; width: 100%; animation: fadeIn 0.3s; }
.page.active { display: block; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.profile-card { width: 100%; background-color: var(--card-bg); border-radius: 8px; margin-top: 15px; overflow: visible; box-shadow: 0 4px 6px rgba(0,0,0,0.1); box-sizing: border-box; position: relative; }
.profile-header { padding: 15px; display: flex; align-items: flex-start; border-bottom: 1px solid var(--separator-color); position: relative; z-index: 10; }
.avatar { width: 50px; height: 50px; border-radius: 50%; margin-right: 12px; object-fit: cover; border: 2px solid var(--separator-color); flex-shrink: 0; background-color: #000; }
.info { flex: 1; overflow: visible; position: relative; }
.player-name { font-size: 17px; margin: 0 0 5px 0; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-main); }
.class-wrapper { position: relative; width: 100%; z-index: 50; }
.class-trigger { background: none; border: none; color: var(--text-secondary); font-size: 12px; padding: 4px 8px; margin: 0; cursor: pointer; text-transform: lowercase; font-family: inherit; display: inline-flex; align-items: center; gap: 4px; outline: none; text-align: left; border-radius: 4px; transition: background 0.2s; width: auto; }
.class-trigger:hover { background-color: rgba(255,255,255,0.05); color: var(--text-main); }
.class-trigger::after { content: '▼'; font-size: 8px; transition: transform 0.2s; display: inline-block; }
.class-trigger.open::after { transform: rotate(180deg); }
.class-list {
display: none;
position: absolute;
top: 100%;
left: 0;
margin-top: 5px;
background-color: var(--input-bg);
border-radius: 4px;
overflow: hidden;
width: 100%;
max-height: 200px;
overflow-y: auto;
border: 1px solid var(--separator-color);
box-shadow: 0 8px 24px rgba(0,0,0,0.6);
z-index: 1000;
}
.class-list.show { display: block; animation: fadeIn 0.2s; }
.class-item { padding: 10px 12px; font-size: 13px; color: var(--text-main); text-transform: lowercase; cursor: pointer; border-bottom: 1px solid var(--separator-color); transition: background 0.1s; user-select: none; }
.class-item:last-child { border-bottom: none; }
.class-item:hover { background-color: rgba(255, 255, 255, 0.1); }
.class-item.active { color: var(--accent); font-weight: 600; background-color: rgba(88, 101, 242, 0.15); }

/* СТАТЫ В ПРОФИЛЕ - ФИКСИРОВАННАЯ ШИРИНА */
.stats-grid { 
    width: 100%; 
    display: grid; 
    grid-template-columns: repeat(3, 1fr); 
    gap: 3px; 
    padding: 8px 15px; 
    box-sizing: border-box; 
}

.stat-cell { 
    background-color: transparent; 
    border: none; 
    border-radius: 0; 
    padding: 4px 4px; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    cursor: pointer; 
    position: relative; 
}

.stat-cell:active, .stat-cell:hover { 
    background-color: transparent; 
}

.stat-row {
    display: flex;
    align-items: center;
    gap: 4px;
    pointer-events: none;
    width: 100%;
    justify-content: center;
    direction: ltr;
}

.stat-icon {
    font-size: 18px;
    flex-shrink: 0;
    width: 20px;
    text-align: center;
}

.stat-value-container {
    position: relative;
    width: 55px;
    display: flex;
    justify-content: flex-start;
    align-items: center;
    gap: 2px;
    flex-shrink: 0;
}

.stat-value {
    font-size: 14px;
    font-weight: 700;
    color: var(--text-main);
    padding: 0;
    margin: 0;
    text-align: left;
    white-space: nowrap;
    direction: ltr;
}

.stat-label {
    font-size: 11px;
    color: var(--text-secondary);
    text-transform: lowercase;
    white-space: nowrap;
    margin: 0;
}

/* ПОЛЕ ВВОДА В ПРОФИЛЕ - СТАТИЧНОЕ 100% */
.stat-input {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: transparent;
    border: none;
    color: var(--text-main);
    font-size: 14px;
    font-weight: 700;
    font-family: inherit;
    padding: 0;
    margin: 0;
    border-radius: 0;
    outline: none;
    text-align: left;
    direction: ltr;
    z-index: 20;
    box-sizing: border-box;
    appearance: none;
    -webkit-appearance: none;
}
.stat-input[type=number] { -moz-appearance: textfield; }
.stat-input::-webkit-outer-spin-button,
.stat-input::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
}

.class-result-box { width: 100%; padding: 0 15px; box-sizing: border-box; margin-bottom: 15px; }
.result-card { background-color: transparent; border: none; border-radius: 0; padding: 12px 0 10px 0; display: flex; align-items: center; box-shadow: none; border-top: 1px solid var(--separator-color); margin-top: 5px; }
.result-description { font-size: 13px; color: var(--text-secondary); line-height: 1.4; width: 100%; }
.highlight-class { color: var(--text-main); font-weight: 700; font-size: 13px; margin-right: 4px; }
.highlight-val { color: var(--text-secondary); font-weight: 600; }

/* --- СТИЛИ ДЛЯ ПОИСКА И СОРТИРОВКИ --- */
.search-container {
width: 100%;
padding: 15px 15px 10px 15px;
box-sizing: border-box;
background-color: var(--bg-color);
position: sticky;
top: 54px;
z-index: 90;
}
.search-controls {
display: flex;
gap: 8px;
align-items: center;
}
.search-input-wrapper {
position: relative;
flex: 1;
}
.search-input {
width: 100%;
background-color: var(--input-bg);
border: 1px solid var(--separator-color);
color: var(--text-main);
font-size: 14px;
padding: 10px 40px 10px 38px;
border-radius: 6px;
outline: none;
transition: border-color 0.2s;
box-sizing: border-box;
font-family: inherit;
}
.search-input:focus {
border-color: var(--separator-color);
}
.search-input::placeholder {
color: var(--text-secondary);
opacity: 0.6;
}
.search-icon {
position: absolute;
left: 10px;
top: 50%;
transform: translateY(-50%);
width: 18px;
height: 18px;
fill: var(--text-secondary);
pointer-events: none;
}
.clear-btn {
position: absolute;
right: 8px;
top: 50%;
transform: translateY(-50%);
width: 24px;
height: 24px;
background: transparent;
border: none;
border-radius: 50%;
cursor: pointer;
display: none;
align-items: center;
justify-content: center;
padding: 0;
transition: background 0.2s;
z-index: 10;
}
.clear-btn.visible {
display: flex;
}
.clear-btn:hover {
background-color: rgba(255, 255, 255, 0.1);
}
.clear-btn svg {
width: 14px;
height: 14px;
fill: var(--text-secondary);
}
.clear-btn:hover svg {
fill: var(--text-main);
}
.sort-btn {
background-color: var(--input-bg);
border: 1px solid var(--separator-color);
color: var(--text-secondary);
font-size: 13px;
padding: 10px 12px;
border-radius: 6px;
cursor: pointer;
display: flex;
align-items: center;
gap: 6px;
transition: all 0.2s;
white-space: nowrap;
font-family: inherit;
}
.sort-btn:hover {
background-color: rgba(255,255,255,0.05);
color: var(--text-main);
}
.sort-btn svg {
width: 20px;
height: 20px;
fill: currentColor;
}
.no-results {
text-align: center;
color: var(--text-secondary);
padding: 20px;
font-size: 14px;
display: none;
}
.books-list {
width: 100%;
padding: 0;
box-sizing: border-box;
}
.book-item {
background-color: transparent;
border: none;
border-radius: 0;
padding: 12px 15px;
margin-bottom: 0;
display: flex;
flex-direction: column;
gap: 6px;
border-bottom: 1px solid var(--separator-color);
}
.book-item:last-child {
border-bottom: none;
}
.book-header {
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: 2px;
}
.book-name {
font-size: 15px;
font-weight: 700;
color: var(--text-main);
text-transform: none;
}

/* СТАТЫ В АКТИВНЫХ КНИГАХ - ИДЕНТИЧНО ПРОФИЛЮ */
.stats-row {
display: flex;
gap: 12px;
font-size: 12px;
color: var(--text-secondary);
margin-bottom: 4px;
flex-wrap: wrap;
}

.stat-item {
display: flex;
align-items: center;
gap: 4px;
cursor: pointer;
padding: 2px 4px;
border-radius: 4px;
transition: background 0.2s;
position: relative;
direction: ltr;
}

.stat-item:hover {
background-color: rgba(255, 255, 255, 0.05);
}

.stat-icon-small {
font-size: 18px;
pointer-events: none;
flex-shrink: 0;
width: 20px;
text-align: center;
}

.stat-value-container-small {
    position: relative;
    width: 55px;
    display: flex;
    justify-content: flex-start;
    align-items: center;
    gap: 2px;
    flex-shrink: 0;
}

.stat-value-small {
    font-size: 14px;
    font-weight: 700;
    color: var(--text-main);
    padding: 0;
    margin: 0;
    text-align: left;
    white-space: nowrap;
    direction: ltr;
    pointer-events: none;
}

.stat-label-small {
    font-size: 11px;
    color: var(--text-secondary);
    text-transform: lowercase;
    white-space: nowrap;
    margin: 0;
    pointer-events: none;
}

/* ПОЛЕ ВВОДА В АКТИВКАХ - ИДЕНТИЧНО ПРОФИЛЮ (БЕЗ РАМОК И ПОДСВЕТКИ) */
.stat-input-small {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: transparent;
    border: none;
    color: var(--text-main);
    font-size: 14px;
    font-weight: 700;
    font-family: inherit;
    padding: 0;
    margin: 0;
    border-radius: 0;
    outline: none;
    text-align: left;
    direction: ltr;
    z-index: 20;
    box-sizing: border-box;
    -webkit-appearance: none;
    appearance: none;
}
.stat-input-small::-webkit-outer-spin-button,
.stat-input-small::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
}
.stat-input-small[type=number] {
    -moz-appearance: textfield;
}
.book-desc {
font-size: 13px;
color: var(--text-secondary);
line-height: 1.4;
white-space: pre-line;
margin-bottom: 4px;
padding-right: 10px;
}
.book-val {
color: var(--text-main);
font-weight: 600;
}
.book-footer {
display: flex;
justify-content: space-between;
align-items: center;
margin-top: 2px;
padding-top: 6px;
width: 100%;
}
.left-group {
display: flex;
align-items: center;
gap: 4px;
max-width: calc(100% - 120px);
flex-shrink: 1;
}

/* УРОВЕНЬ КНИГ - ВПРИТЫК К ЧИСЛУ */
.book-level-wrapper {
display: flex;
align-items: center;
gap: 0;
max-width: 100%;
flex-wrap: nowrap;
}
.book-level-input {
background: transparent;
border: none;
color: var(--text-main);
font-size: 13px;
font-weight: 700;
padding: 4px 0;
width: auto;
min-width: 18px;
max-width: 150px;
text-align: left;
outline: none;
-moz-appearance: textfield;
flex-shrink: 1;
flex-grow: 0;
margin: 0;
}
.book-level-input::-webkit-outer-spin-button,
.book-level-input::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
}
.book-level-unit {
color: var(--text-secondary);
font-size: 13px;
white-space: nowrap;
flex-shrink: 0;
margin: 0;
padding: 0;
margin-left: -2px;
}
.book-percent {
color: var(--text-secondary);
font-size: 12px;
white-space: nowrap;
flex-shrink: 0;
}
.book-price {
color: var(--gold);
font-weight: 500;
font-size: 13px;
flex-shrink: 0;
margin-left: auto;
}

/* Стили для подвала */
.app-footer {
width: 100%;
max-width: 500px;
padding: 20px 15px;
margin-top: 20px;
border-top: 1px solid var(--separator-color);
text-align: center;
box-sizing: border-box;
background-color: var(--bg-color);
}
.footer-text {
font-size: 12px;
color: var(--text-secondary);
line-height: 1.6;
}
.footer-link {
color: var(--text-main);
text-decoration: none;
font-weight: 500;
transition: color 0.2s;
}
.footer-link:hover {
color: var(--accent);
text-decoration: underline;
}
.hidden {
display: none !important;
}
</style>
</head>
<body>
<div class="top-nav">
<div class="nav-item active" onclick="switchPage('profile')" id="nav-profile">
<svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
</div>
<div class="nav-item" onclick="switchPage('active')" id="nav-active">
<span>📕</span>
</div>
<div class="nav-item" onclick="switchPage('passive')" id="nav-passive">
<span>📘</span>
</div>
</div>
<div class="content-container">
<!-- СТРАНИЦА ПРОФИЛЯ -->
<div id="page-profile" class="page active">
<div class="profile-card">
<div class="profile-header">
<img src="https://via.placeholder.com/50" alt="Avatar" class="avatar" id="user-avatar">
<div class="info">
<h1 class="player-name" id="user-name">Загрузка...</h1>
<div class="class-wrapper">
<button class="class-trigger" id="classTrigger" onclick="toggleClassList()">жнец душ</button>
<div class="class-list" id="classList"></div>
</div>
</div>
</div>
<div class="stats-grid">
<div class="stat-cell" onclick="editStatByCell(this)"><div class="stat-row"><span class="stat-icon">🕯️</span><div class="stat-value-container"><span class="stat-value" data-key="lvl">207</span><span class="stat-label">ур</span></div></div></div>
<div class="stat-cell" onclick="editStatByCell(this)"><div class="stat-row"><span class="stat-icon">⚔️</span><div class="stat-value-container"><span class="stat-value" data-key="atk">717</span><span class="stat-label">атк</span></div></div></div>
<div class="stat-cell" onclick="editStatByCell(this)"><div class="stat-row"><span class="stat-icon">🛡️</span><div class="stat-value-container"><span class="stat-value" data-key="armor">212</span><span class="stat-label">брн</span></div></div></div>
<div class="stat-cell" onclick="editStatByCell(this)"><div class="stat-row"><span class="stat-icon">💪</span><div class="stat-value-container"><span class="stat-value" data-key="str">403</span><span class="stat-label">сил</span></div></div></div>
<div class="stat-cell" onclick="editStatByCell(this)"><div class="stat-row"><span class="stat-icon">👐</span><div class="stat-value-container"><span class="stat-value" data-key="agi">861</span><span class="stat-label">лвк</span></div></div></div>
<div class="stat-cell" onclick="editStatByCell(this)"><div class="stat-row"><span class="stat-icon">❤️</span><div class="stat-value-container"><span class="stat-value" data-key="vit">602</span><span class="stat-label">внс</span></div></div></div>
<div class="stat-cell" onclick="editStatByCell(this)"><div class="stat-row"><span class="stat-icon">🍀</span><div class="stat-value-container"><span class="stat-value" data-key="luck">57</span><span class="stat-label">удч</span></div></div></div>
<div class="stat-cell" onclick="editStatByCell(this)"><div class="stat-row"><span class="stat-icon">🎯</span><div class="stat-value-container"><span class="stat-value" data-key="acc">112</span><span class="stat-label">тчн</span></div></div></div>
<div class="stat-cell" onclick="editStatByCell(this)"><div class="stat-row"><span class="stat-icon">🌀</span><div class="stat-value-container"><span class="stat-value" data-key="conc">64</span><span class="stat-label">кц</span></div></div></div>
<div class="stat-cell" onclick="editStatByCell(this)"><div class="stat-row"><span class="stat-icon">📜</span><div class="stat-value-container"><span class="stat-value" data-key="class_lvl">50</span><span class="stat-label">ур. кл.</span></div></div></div>
<div class="stat-cell" onclick="editStatByCell(this, true)"><div class="stat-row"><span class="stat-icon">🔰</span><div class="stat-value-container"><span class="stat-value" data-key="resist">0%</span><span class="stat-label">сопр</span></div></div></div>
<div class="stat-cell" onclick="editStatByCell(this, false, true)"><div class="stat-row"><span class="stat-icon" id="karma-icon">😐</span><div class="stat-value-container"><span class="stat-value" data-key="karma">0</span><span class="stat-label">карма</span></div></div></div>
</div>
<div class="class-result-box">
<div class="result-card">
<div class="result-description" id="res-class-desc"></div>
</div>
</div>
</div>
</div>
<!-- СТРАНИЦА АКТИВНЫХ УМЕНИЙ -->
<div id="page-active" class="page">
<div class="search-container">
<div class="search-controls">
<div class="search-input-wrapper">
<svg class="search-icon" viewBox="0 0 24 24">
<path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
</svg>
<input type="text" class="search-input" id="activeSearchInput" placeholder="Поиск по активкам..." oninput="handleActiveSearch()">
<button class="clear-btn" id="clearActiveSearchBtn" onclick="clearActiveSearch()" aria-label="Очистить поиск">
<svg viewBox="0 0 24 24">
<path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
</svg>
</button>
</div>
<button class="sort-btn" onclick="toggleActiveSort()" id="activeSortBtn" title="Сортировка">
<svg id="activeSortIconList" viewBox="0 0 24 24">
<path d="M3 18h6v-2H3v2zM3 6v2h18V6H3zm0 7h12v-2H3v2z"/>

function measureTextWidth(text, font, padding = 0) {
const span = document.createElement('span');
span.style.font = font;
span.style.visibility = 'hidden';
span.style.position = 'absolute';
span.style.whiteSpace = 'nowrap';
span.style.fontSize = '14px';

span.textContent = text || '1';
document.body.appendChild(span);
const width = span.offsetWidth;
document.body.removeChild(span);
return width + padding;
}

function getKarmaIcon(value) {

if (num < 0) return '😈';
if (num === 0) return '😐';
return '😇';
}

function updateKarmaIcon() {
const karmaVal = document.querySelector('.stat-value[data-key="karma"]');
if (karmaVal) {

let displayVal = val;
if (displayVal < -20) displayVal = -20;
if (displayVal > 20) displayVal = 20;
karmaIconSpan.textContent = getKarmaIcon(displayVal);
if (val !== displayVal) karmaVal.textContent = displayVal;
}
}

function calculateRunesResist(runesCount) {
if (runesCount < 0) runesCount = 0;
if (runesCount === 0) return 0;
let resist = 10.0 * Math.pow(runesCount, 0.25);
return Math.min(100, Math.floor(resist));
}

function calculateClassEffect(type, level) {
if (level < 1) level = 1;
let coefficient = 5.0;
let maxCap = 30.0;
if (type === 'warlock' || type === 'vampire') {
coefficient = 10.0;
maxCap = 50.0;
}
let effect = coefficient * Math.sqrt(level / 1000.0) + 10.0;
effect = Math.floor(effect * 10) / 10;
return Math.min(maxCap, effect);
}

function calculateActiveDamage(skillName, level, stats) {
const skill = ACTIVE_SKILLS[skillName];
if (!skill) return '?';
try {
if (!skill.calc_damage) {
if (skill.calc) {
return skill.calc(level);
}
return '?';
}
const params = skill.params || [];
if (params.length === 1) {
const param = params[0];
const value = stats[param] || 0;
return skill.calc_damage(level, value);
} else if (params.length === 2) {
const param1 = params[0];
const param2 = params[1];
const value1 = stats[param1] || 0;
const value2 = stats[param2] || 0;
return skill.calc_damage(level, value1, value2);
}
switch(skillName) {
case "Грязный удар":
return skill.calc_damage(level, stats.agi, stats.str);
case "Слабое исцеление":
return skill.calc_damage(level, stats.vit);
case "Удар вампира":
return skill.calc_damage(level, stats.agi, stats.vit);
case "Мощный удар":
return skill.calc_damage(level, stats.str, stats.atk);
case "Сила теней":
return skill.calc_damage(level, stats.lvl);
case "Расправа":
return skill.calc_damage(level, stats.lvl);
case "Рассечение":
return skill.calc_damage(level, stats.atk, stats.agi);
case "Таран":
return skill.calc_damage(level, stats.armor);
case "Огонек надежды":
return skill.calc_damage(level, stats.vit);
case "Кровотечение":
return skill.calc_damage(level, stats.atk, stats.agi);
case "Заражение":
return skill.calc_damage(level, stats.vit);
case "Раскол":
return skill.calc_damage(level, stats.agi);
default:
return skill.calc ? skill.calc(level) : '?';
}
} catch (e) {
console.log('Ошибка расчета для', skillName, e);
return '?';
}
}

// Функция для редактирования статов в активных книгах - С ОГРАНИЧЕНИЯМИ
window.editActiveStat = function(event, element, statKey) {
event.preventDefault();
event.stopPropagation();
const valueContainer = element.querySelector('.stat-value-container-small');
const valueSpan = valueContainer.querySelector('.stat-value-small');
const labelSpan = valueContainer.querySelector('.stat-label-small');
if (!valueSpan) return;
let currentVal = valueSpan.textContent;
const key = statKey;
const input = document.createElement('input');
input.type = 'number';
input.value = currentVal === '0' ? '' : currentVal;
input.className = 'stat-input-small';

// ⬇️ ОГРАНИЧЕНИЕ НА 5 СИМВОЛОВ / 99999 ⬇️
input.maxLength = 5;
input.max = '99999';

// Блокировка ввода более 5 символов
input.addEventListener('input', function() {
    if (this.value.length > 5) {
        this.value = this.value.slice(0, 5);
    }
});

valueSpan.style.visibility = 'hidden';
if (labelSpan) labelSpan.style.visibility = 'hidden';
valueContainer.appendChild(input);
input.focus();
input.select();

const finish = () => {
let newVal = input.value;
if (newVal === '') newVal = '0';
let finalValue = newVal;
const num = parseFloat(newVal);
if (!isNaN(num)) {
    if (num > 99999) finalValue = '99999';
    else finalValue = Math.floor(num).toString();
}

// ⬇️ ПРОВЕРКИ МИНИМАЛЬНЫХ ЗНАЧЕНИЙ ДЛЯ СТАТОВ ⬇️
if (key === 'str' || key === 'agi' || key === 'vit') {
    if (parseInt(finalValue) < 3) finalValue = '3';
}

valueSpan.textContent = finalValue;
valueSpan.style.visibility = 'visible';
if (labelSpan) labelSpan.style.visibility = 'visible';
input.remove();

// Обновляем соответствующий стат в профиле
const profileStat = document.querySelector(`.stat-value[data-key="${key}"]`);
if (profileStat) {
profileStat.textContent = finalValue;
}

saveStats();

// Перерисовываем активные книги с новыми статами
const items = document.querySelectorAll('#activeBooksContainer .book-item');
const stats = getStatsFromProfile();
items.forEach(item => {
const bookName = item.querySelector('.book-name').textContent;
const level = parseInt(item.querySelector('.book-level-input').value) || 1;
const descDiv = item.querySelector('.book-desc');
if (descDiv) {
descDiv.innerHTML = getSkillDescription(bookName, level, stats);
}
const statsDiv = item.querySelector('.stats-row');
if (statsDiv) {
statsDiv.innerHTML = getStatsString(bookName, stats);
}
const percentSpan = item.querySelector('.book-percent');
const skill = ACTIVE_SKILLS[bookName];
if (percentSpan && skill && skill.calc) {
const effectPercent = skill.calc(level);
percentSpan.textContent = `(${effectPercent}%)`;
}
updateActiveBookPrice(item, bookName, level);
});
};
input.onblur = finish;
input.onkeydown = e => {
if(e.key === 'Enter') {
e.preventDefault();
e.stopPropagation();
input.blur();
return false;
}
};
input.onclick = e => e.stopPropagation();
};

function getSkillDescription(skillName, level, stats) {
const skill = ACTIVE_SKILLS[skillName];
if (!skill) return skillName;
let desc = skill.desc;
const damage = calculateActiveDamage(skillName, level, stats);
const mult = skill.calc ? skill.calc(level) : 0;
switch(skillName) {
case "Расправа":
const inner = Math.sqrt(level*10)/100 + 1;
const rounded = Math.floor(inner * 100) / 100;
const x_percent = Math.floor(rounded * 50);
const max_damage = stats.lvl * 50;
desc = desc.replace('{x_percent}', `<span class="book-val">${x_percent}</span>`)
.replace('{max_damage}', `<span class="book-val">${max_damage}</span>`)
.replace('{damage}', `<span class="book-val">${damage}</span>`);
break;
case "Слабое исцеление":
const heal_percent = Math.floor(mult / 4);
const accuracy_reduce = Math.floor(heal_percent / 5);
desc = desc.replace('{heal_percent}', `<span class="book-val">${heal_percent}</span>`)
.replace('{accuracy_reduce}', `<span class="book-val">${accuracy_reduce}</span>`);
break;
case "Удар вампира":
const regen = Math.ceil(damage / 15);
desc = desc.replace('{regen}', `<span class="book-val">${regen}</span>`)
.replace('{damage}', `<span class="book-val">${damage}</span>`);
break;
case "Берсеркер":
const berserk_percent = Math.floor((Math.sqrt(level*10)/100*1 + 1) * 50);
desc = desc.replace('{berserk_percent}', `<span class="book-val">${berserk_percent}</span>`);
break;
case "Проклятие тьмы":
const min_reduce = Math.floor(mult / 20);
const max_reduce = Math.floor(mult * 3 / 20);
const max_units = stats.lvl * 10;
desc = desc.replace('{min_reduce}', `<span class="book-val">${min_reduce}</span>`)
.replace('{max_reduce}', `<span class="book-val">${max_reduce}</span>`)
.replace('{max_units}', `<span class="book-val">${max_units}</span>`);
break;
case "Целебный огонь":
const heal_percent_fire = Math.floor((Math.sqrt(level*10)/100*0.5 + 1) * 20);
const max_heal = stats.lvl * 50;
desc = desc.replace(/{heal_percent}/g, `<span class="book-val">${heal_percent_fire}</span>`)
.replace('{max_heal}', `<span class="book-val">${max_heal}</span>`);
break;
case "Слепота":
desc = desc.replace('{damage}', `<span class="book-val">${mult}</span>`);
break;
case "Раскол":
const armor_reduce = Math.floor((Math.sqrt(level*10)/100*0.5 + 1) * 30);
desc = desc.replace('{armor_reduce}', `<span class="book-val">${armor_reduce}</span>`)
.replace('{damage}', `<span class="book-val">${damage}</span>`);
break;
default:
desc = desc.replace('{damage}', `<span class="book-val">${damage}</span>`);
}
return desc;
}

async function renderPassiveBooks() {
const savedLevels = JSON.parse(localStorage.getItem(BOOKS_LVL_KEY) || '{}');
const container = document.getElementById('passiveBooksContainer');
container.innerHTML = '';
let booksArray = [];
if (passiveSortByAlphabet) {
booksArray = Object.entries(PASSIVE_SKILLS).sort((a, b) => a[0].localeCompare(b[0], 'ru'));
} else {
for (const bookName of PASSIVE_ORDER) {
if (PASSIVE_SKILLS[bookName]) {
booksArray.push([bookName, PASSIVE_SKILLS[bookName]]);
}
}
const existingBooks = new Set(booksArray.map(([name]) => name));
for (const [name, data] of Object.entries(PASSIVE_SKILLS)) {
if (!existingBooks.has(name)) {
booksArray.push([name, data]);
}
}
}
for (const [name, data] of booksArray) {
const lvl = savedLevels[name] || 1;
let result = data.calc(lvl);
let formatData;
if (data.format) {
if (typeof data.format === 'function') {
formatData = data.format(result, lvl);
} else {
formatData = data.format;
}
} else {
formatData = { result: result };
}
let desc = data.desc;
for (const [key, val] of Object.entries(formatData)) {
const regex = new RegExp(`\\{${key}(?::\\.2f)?\\}`, 'g');
desc = desc.replace(regex, `<span class="book-val">${val}</span>`);
}
const item = document.createElement('div');
item.className = 'book-item';
item.dataset.bookName = name.toLowerCase();
let priceText = '0';
try {
const bookPrice = await getBookPrice(name);
if (bookPrice && bookPrice > 0) {
const totalCost = calculateUpgradeCost(lvl, bookPrice);
if (totalCost) {
priceText = formatGold(totalCost);

}
} catch (e) {
console.log('Ошибка получения цены для', name);

nameDiv.className = 'book-name';

footerDiv.className = 'book-footer';
const levelWrapper = document.createElement('div');
levelWrapper.className = 'book-level-wrapper';
const levelInput = document.createElement('input');
levelInput.type = 'number';
levelInput.className = 'book-level-input';
levelInput.value = lvl;
levelInput.min = '1';
levelInput.setAttribute('form', 'off');
levelInput.setAttribute('autocomplete', 'off');
levelInput.setAttribute('autocorrect', 'off');
levelInput.setAttribute('spellcheck', 'false');
const updateInputWidth = function() {
const font = window.getComputedStyle(this).font;
const width = measureTextWidth(this.value || '1', font, 2);
this.style.width = (width + 2) + 'px';
};
levelInput.addEventListener('input', updateInputWidth);
levelInput.addEventListener('keydown', function(event) {
if (event.key === 'Enter') {
event.preventDefault();
event.stopPropagation();
event.stopImmediatePropagation();
this.blur();
return false;
}
}, true);
levelInput.addEventListener('keypress', function(event) {
if (event.key === 'Enter') {
event.preventDefault();
event.stopPropagation();
return false;
}
}, true);
levelInput.addEventListener('keyup', function(event) {
if (event.key === 'Enter') {
event.preventDefault();
event.stopPropagation();
return false;
}
}, true);
levelInput.addEventListener('blur', function() {
updatePassiveBookLevel(name, this.value);
});
setTimeout(() => {
const font = window.getComputedStyle(levelInput).font;
const width = measureTextWidth(levelInput.value || '1', font, 2);
levelInput.style.width = (width + 2) + 'px';
}, 0);

function saveStats() {
const data = {};
document.querySelectorAll('.stat-value').forEach(el => data[el.dataset.key] = el.textContent);
localStorage.setItem(DB_KEY, JSON.stringify(data));
localStorage.setItem(DATE_KEY, Date.now().toString());
updateClassResult();
updateKarmaIcon();
}

function loadStats() {
const raw = localStorage.getItem(DB_KEY);
if (!raw) return;
const data = JSON.parse(raw);
document.querySelectorAll('.stat-value').forEach(el => {
if (data[el.dataset.key]) el.textContent = data[el.dataset.key];
});
updateClassResult();
updateKarmaIcon();
}

// Функция для редактирования статов в профиле - С ОГРАНИЧЕНИЯМИ
window.editStatByCell = function(cellElement, isResist = false, isKarma = false) {
const valueContainer = cellElement.querySelector('.stat-value-container');
const valueSpan = valueContainer.querySelector('.stat-value');
const labelSpan = valueContainer.querySelector('.stat-label');
let currentVal = valueSpan.textContent;
const key = valueSpan.dataset.key;
let cleanVal = currentVal;
if (isResist) cleanVal = currentVal.replace('%', '');
const input = document.createElement('input');
input.type = 'number';
input.value = cleanVal === '0' ? '' : cleanVal;
input.className = 'stat-input';

// ⬇️ ОГРАНИЧЕНИЕ НА 5 СИМВОЛОВ / 99999 ⬇️
input.maxLength = 5;
input.max = '99999';

// Блокировка ввода более 5 символов
input.addEventListener('input', function() {
    if (this.value.length > 5) {
        this.value = this.value.slice(0, 5);
    }
});

valueSpan.style.visibility = 'hidden';
if (labelSpan) labelSpan.style.visibility = 'hidden';
valueContainer.appendChild(input);
input.focus();
input.select();

const finish = () => {
let newVal = input.value;
if (newVal === '') newVal = '0';
let finalValue = newVal;
const num = parseFloat(newVal);
if (!isNaN(num)) {
if (num > 99999) finalValue = '99999';
else finalValue = Math.floor(num).toString();
}
if (isResist) {
const runes = parseFloat(newVal);
const percent = calculateRunesResist(runes);
finalValue = percent + '%';
} else if (isKarma) {
let karmaNum = parseInt(newVal);
if (karmaNum < -20) karmaNum = -20;
if (karmaNum > 20) karmaNum = 20;
finalValue = karmaNum.toString();
} else {
// ⬇️ НОВЫЕ ПРОВЕРКИ ДЛЯ МИНИМАЛЬНЫХ ЗНАЧЕНИЙ ⬇️
if (key === 'class_lvl') {
if (parseInt(finalValue) < 50) finalValue = '50';
}
else if (key === 'str' || key === 'agi' || key === 'vit') {
if (parseInt(finalValue) < 3) finalValue = '3';
}
}
valueSpan.textContent = finalValue;
valueSpan.style.visibility = 'visible';
if (labelSpan) labelSpan.style.visibility = 'visible';
input.remove();
if (isKarma) updateKarmaIcon();
saveStats();
};

input.onblur = finish;
input.onkeydown = e => {
if(e.key === 'Enter') {
e.preventDefault();
e.stopPropagation();
input.blur();
return false;
}
};
input.onclick = e => e.stopPropagation();
}

window.onload = () => {
checkReset();
loadStats();
initClassList();
try {
vkBridge.send('VKWebAppInit')
.then(() => {
console.log('VK Bridge инициализирован успешно');
loadVKUserData();
})
.catch(error => {
console.log('Ошибка инициализации VK Bridge:', error);
document.getElementById('user-name').textContent = 'Тестовый пользователь';
});
} catch (e) {
console.log('VK Bridge не доступен (возможно, запуск вне VK)');
document.getElementById('user-name').textContent = 'Тестовый пользователь';
}
};
</script>
